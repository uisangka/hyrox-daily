<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HYROX Daily - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #0c0c0c;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto',
          'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans',
          'Helvetica Neue', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        text-align: center;
        max-width: 500px;
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 20px;
        font-weight: 700;
        letter-spacing: 0.05em;
      }

      .offline-icon {
        font-size: 4rem;
        margin-bottom: 20px;
      }

      p {
        font-size: 1.1rem;
        color: #999;
        margin-bottom: 30px;
        line-height: 1.6;
      }

      .button {
        display: inline-block;
        padding: 12px 30px;
        background-color: #E5FE3D;
        color: #0c0c0c;
        text-decoration: none;
        border-radius: 4px;
        font-weight: 600;
        transition: background-color 0.2s;
        border: none;
        cursor: pointer;
        font-size: 1rem;
      }

      .button:hover {
        background-color: #ffff66;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="offline-icon">📵</div>
      <h1>Offline Mode</h1>
      <p>인터넷 연결이 필요합니다.</p>
      <p>잠시 후 다시 시도해주세요.</p>
      <button class="button" onclick="window.location.reload()">
        새로고침
      </button>
    </div>
  </body>
</html>
